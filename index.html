<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Flappy Beer 🍺</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#0d0628; display:flex; justify-content:center; align-items:center;
    height:100dvh; overflow:hidden; font-family:'Arial Black',sans-serif; touch-action:none; }
  #wrap { position:relative; width:100%; max-width:420px; height:100dvh; max-height:820px; }
  canvas { display:block; width:100%; height:100%; cursor:pointer; }
</style>
</head>
<body>
<div id="wrap"><canvas id="game"></canvas></div>
<script>
"use strict";
// ============================================================
//  FLAPPY BEER  —  Canvas 2D, sprites HD pré-rendus
// ============================================================
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = 420, H = 800;
canvas.width = W; canvas.height = H;

// ── Réglages gameplay ─────────────────────────────────────────
const GRAVITY=0.40, FLAP=-8.6, SPEED=3.2, GAP=200, SPAWN=1650;
const BX=92, BW=40, BH=104;
const OPENER_W=82, SPR_H=140, FLOOR=60;

// ── État ──────────────────────────────────────────────────────
let state='START', score=0, best=parseInt(localStorage.getItem('flappyBeerBest')||'0');
let last=0, spawnT=0;
const bird={ x:BX, y:H/2, vy:0, rot:0, opened:false, cap:null, shake:0 };
let pipes=[];

// ── Décor ─────────────────────────────────────────────────────
const stars=Array.from({length:55},()=>({x:Math.random()*W,y:Math.random()*H*0.62,r:Math.random()*1.8+0.4,a:Math.random(),da:(Math.random()-0.5)*0.015}));
const clouds=Array.from({length:5},(_,i)=>({x:i*(W/4),y:70+Math.random()*120,r:30+Math.random()*25,s:0.4+Math.random()*0.3}));

// ── Helper étoile ─────────────────────────────────────────────
function star(g,x,y,pts,outer,inner){
  g.beginPath();
  for(let i=0;i<pts*2;i++){
    const r=i%2?inner:outer, a=(i/(pts*2))*Math.PI*2-Math.PI/2;
    const px=x+Math.cos(a)*r, py=y+Math.sin(a)*r;
    i?g.lineTo(px,py):g.moveTo(px,py);
  }
  g.closePath();
}

// ============================================================
//  SPRITE DÉCAPSULEUR — acier inox, rendu HD 2x
//  Tête en bas (bord actif), manche vers le haut. Retourné pour le bas.
// ============================================================
function buildOpener(){
  const S=2, SW=82, SH=140;
  const cv=document.createElement('canvas');
  cv.width=SW*S; cv.height=SH*S;
  const g=cv.getContext('2d'); g.scale(S,S);
  const cx=SW/2;

  // silhouette : décapsuleur plat inox (manche droit -> tête à épaules arrondies)
  function sil(){
    g.beginPath();
    g.moveTo(cx-13, 0);
    g.lineTo(cx-13, 56);
    g.bezierCurveTo(cx-13,72, cx-34,80, cx-34,102);
    g.lineTo(cx-34,118);
    g.arcTo(cx-34,140, cx-14,140, 20);
    g.lineTo(cx+14,140);
    g.arcTo(cx+34,140, cx+34,118, 20);
    g.lineTo(cx+34,102);
    g.bezierCurveTo(cx+34,80, cx+13,72, cx+13,56);
    g.lineTo(cx+13, 0);
    g.closePath();
  }

  // 1) remplissage inox poli (dégradé chrome horizontal)
  sil();
  const steel=g.createLinearGradient(cx-34,0,cx+34,0);
  steel.addColorStop(0,'#54697a'); steel.addColorStop(0.1,'#8499a8');
  steel.addColorStop(0.22,'#c4d6e0'); steel.addColorStop(0.34,'#eef6fa');
  steel.addColorStop(0.46,'#b6c8d4'); steel.addColorStop(0.5,'#9fb2c0');
  steel.addColorStop(0.54,'#b6c8d4'); steel.addColorStop(0.66,'#ffffff');
  steel.addColorStop(0.78,'#c4d6e0'); steel.addColorStop(0.9,'#8499a8');
  steel.addColorStop(1,'#54697a');
  g.fillStyle=steel; g.fill();

  // 2) reflets diagonaux (comme sur la photo), clippés
  g.save(); sil(); g.clip();
  g.strokeStyle='rgba(255,255,255,0.55)'; g.lineWidth=4; g.lineCap='round';
  g.beginPath(); g.moveTo(cx-19,28); g.lineTo(cx-7,72); g.stroke();
  g.beginPath(); g.moveTo(cx+9,92); g.lineTo(cx+20,122); g.stroke();
  g.strokeStyle='rgba(0,0,0,0.12)'; g.lineWidth=3;
  g.beginPath(); g.moveTo(cx+15,30); g.lineTo(cx+24,60); g.stroke();
  g.restore();

  // reflet brillant sur la tête
  g.beginPath(); g.ellipse(cx-14,108,8,15,-0.3,0,Math.PI*2);
  g.fillStyle='rgba(255,255,255,0.4)'; g.fill();

  // 3) contour + biseau clair
  sil(); g.strokeStyle='#2c3e4c'; g.lineWidth=2.5; g.stroke();
  sil(); g.strokeStyle='rgba(255,255,255,0.3)'; g.lineWidth=1; g.stroke();

  // 4) DÉCOUPES TRANSPARENTES (cœur + encoche + trou rond)
  function heart(x,y,w,h){
    g.beginPath();
    g.moveTo(x,y+h*0.28);
    g.bezierCurveTo(x,y, x-w,y, x-w,y+h*0.32);
    g.bezierCurveTo(x-w,y+h*0.58, x,y+h*0.80, x,y+h);
    g.bezierCurveTo(x,y+h*0.80, x+w,y+h*0.58, x+w,y+h*0.32);
    g.bezierCurveTo(x+w,y, x,y, x,y+h*0.28);
    g.closePath();
  }
  g.save();
  g.globalCompositeOperation='destination-out';
  heart(cx, 84, 21, 40); g.fill();              // cœur (vrai trou transparent)
  g.beginPath(); g.roundRect(cx-11,131,22,6,3); g.fill();  // encoche sous le cœur
  g.beginPath(); g.arc(cx,26,10,0,Math.PI*2); g.fill();    // petit trou rond du manche
  g.restore();

  // 5) liseré sombre sur le bord des découpes (épaisseur métal)
  g.strokeStyle='rgba(25,35,45,0.55)'; g.lineWidth=1.5;
  heart(cx,84,21,40); g.stroke();
  g.beginPath(); g.roundRect(cx-11,131,22,6,3); g.stroke();
  g.beginPath(); g.arc(cx,26,10,0,Math.PI*2); g.stroke();
  // mini reflet clair bord bas du cœur
  g.beginPath(); g.arc(cx, 84+40, 21*0.5, 0.2*Math.PI, 0.8*Math.PI, false);
  g.strokeStyle='rgba(255,255,255,0.4)'; g.lineWidth=1.2; g.stroke();

  return cv;
}
const OPENER=buildOpener();

// manche inox plat extensible
function drawHandle(cx,y1,y2){
  if(y2-y1<=2) return;
  const w=26;
  // même dégradé que la zone manche du sprite -> raccord invisible
  const g=ctx.createLinearGradient(cx-34,0,cx+34,0);
  g.addColorStop(0,'#54697a'); g.addColorStop(0.1,'#8499a8');
  g.addColorStop(0.22,'#c4d6e0'); g.addColorStop(0.34,'#eef6fa');
  g.addColorStop(0.46,'#b6c8d4'); g.addColorStop(0.5,'#9fb2c0');
  g.addColorStop(0.54,'#b6c8d4'); g.addColorStop(0.66,'#ffffff');
  g.addColorStop(0.78,'#c4d6e0'); g.addColorStop(0.9,'#8499a8');
  g.addColorStop(1,'#54697a');
  ctx.beginPath(); ctx.roundRect(cx-w/2,y1,w,y2-y1,4); ctx.fillStyle=g; ctx.fill();
  ctx.strokeStyle='#2c3e4c'; ctx.lineWidth=2; ctx.stroke();
}
function drawOpener(px,gapY,isTop){
  const cx=px+OPENER_W/2;
  if(isTop){
    const headTop=gapY-SPR_H;
    drawHandle(cx,0,headTop+16);
    ctx.drawImage(OPENER, cx-OPENER_W/2, headTop, OPENER_W, SPR_H);
  } else {
    const edge=gapY+GAP;
    drawHandle(cx, edge+SPR_H-16, H-FLOOR);
    ctx.save(); ctx.translate(cx, edge+SPR_H); ctx.scale(1,-1);
    ctx.drawImage(OPENER, -OPENER_W/2, 0, OPENER_W, SPR_H);
    ctx.restore();
  }
}

// ============================================================
//  SPRITE BOUTEILLE — verre vert HD (sans capsule, ajoutée en jeu)
// ============================================================
// géométrie partagée (coords haut-gauche [0..BW]x[0..BH])
const Gb=(()=>{
  const bodyW=BW-4, bodyH=BH*0.52, bodyTop=BH-bodyH;
  const shldH=BH*0.15, neckW=10, neckH=BH*0.18, neckTop=bodyTop-shldH-neckH;
  const mouthW=8, mouthH=7, mouthTop=neckTop-mouthH;
  return {bodyW,bodyH,bodyTop,shldH,neckW,neckH,neckTop,mouthW,mouthH,mouthTop};
})();

function buildBottle(){
  const S=2, PAD=5;
  const w=BW+PAD*2, h=BH+PAD*2;
  const cv=document.createElement('canvas');
  cv.width=w*S; cv.height=h*S;
  const g=cv.getContext('2d'); g.scale(S,S); g.translate(PAD,PAD);
  cv._w=w; cv._h=h; cv._pad=PAD;

  const {bodyW,bodyH,bodyTop,shldH,neckW,neckH,neckTop}=Gb;
  const cx=BW/2;

  function glass(){
    g.beginPath();
    g.moveTo(cx-bodyW/2, BH-12);
    g.arcTo(cx-bodyW/2, BH, cx-bodyW/2+12, BH, 12);
    g.lineTo(cx+bodyW/2-12, BH);
    g.arcTo(cx+bodyW/2, BH, cx+bodyW/2, BH-12, 12);
    g.lineTo(cx+bodyW/2, bodyTop);
    g.bezierCurveTo(cx+bodyW/2, bodyTop-shldH*0.5, cx+neckW/2+3, bodyTop-shldH*0.9, cx+neckW/2, bodyTop-shldH);
    g.lineTo(cx+neckW/2, neckTop);
    g.lineTo(cx-neckW/2, neckTop);
    g.lineTo(cx-neckW/2, bodyTop-shldH);
    g.bezierCurveTo(cx-neckW/2-3, bodyTop-shldH*0.9, cx-bodyW/2, bodyTop-shldH*0.5, cx-bodyW/2, bodyTop);
    g.closePath();
  }

  // 1) base verre — dégradé vertical
  glass();
  let vg=g.createLinearGradient(0,neckTop,0,BH);
  vg.addColorStop(0,'#2a8f24'); vg.addColorStop(0.12,'#218a1c');
  vg.addColorStop(0.5,'#1a7a18'); vg.addColorStop(0.85,'#0f5a0f'); vg.addColorStop(1,'#0a3f0a');
  g.fillStyle=vg; g.fill();

  // 2) modelé cylindrique + reflets (clippé)
  g.save(); glass(); g.clip();
  let hg=g.createLinearGradient(cx-bodyW/2,0,cx+bodyW/2,0);
  hg.addColorStop(0,'rgba(0,0,0,0.5)');
  hg.addColorStop(0.16,'rgba(0,0,0,0)');
  hg.addColorStop(0.26,'rgba(190,255,190,0.55)');  // bande lumineuse
  hg.addColorStop(0.36,'rgba(255,255,255,0)');
  hg.addColorStop(0.72,'rgba(0,0,0,0)');
  hg.addColorStop(1,'rgba(0,0,0,0.5)');
  g.fillStyle=hg; g.fillRect(cx-bodyW/2,0,bodyW,BH);
  // sheen haut (lumière du dessus)
  let tg=g.createLinearGradient(0,neckTop,0,bodyTop+12);
  tg.addColorStop(0,'rgba(255,255,255,0.3)'); tg.addColorStop(1,'rgba(255,255,255,0)');
  g.fillStyle=tg; g.fillRect(cx-bodyW/2,neckTop,bodyW,bodyTop-neckTop+12);
  // condensation
  g.fillStyle='rgba(230,255,230,0.45)';
  [[cx-9,BH*0.55,1.6],[cx-5,BH*0.7,1],[cx+7,BH*0.62,1.3],[cx+10,BH*0.8,1],
   [cx-11,BH*0.86,1.4],[cx+3,BH*0.5,1],[cx-3,BH*0.92,1.2],[cx+8,BH*0.92,1]].forEach(([dx,dy,r])=>{
    g.beginPath(); g.arc(dx,dy,r,0,Math.PI*2); g.fill();
  });
  g.restore();

  // 3) contour + liseré clair gauche
  glass(); g.strokeStyle='rgba(5,40,5,0.85)'; g.lineWidth=1.5; g.stroke();
  g.beginPath(); g.moveTo(cx-bodyW/2+2.5,bodyTop+4); g.lineTo(cx-bodyW/2+2.5,BH-14);
  g.strokeStyle='rgba(220,255,220,0.45)'; g.lineWidth=2; g.stroke();
  // bague col
  g.beginPath(); g.roundRect(cx-neckW/2-1, neckTop+neckH*0.5, neckW+2, 4, 1);
  g.fillStyle='#1c8a1c'; g.fill(); g.strokeStyle='#0a3f0a'; g.lineWidth=1; g.stroke();

  // 4) ÉTIQUETTE ronde (style Heineken)
  const lbY=bodyTop+bodyH*0.40, lbR=bodyW*0.44;
  g.beginPath(); g.arc(cx,lbY,lbR,0,Math.PI*2);
  g.fillStyle='#0e4e0e'; g.fill(); g.strokeStyle='#d4b106'; g.lineWidth=2; g.stroke();
  g.beginPath(); g.arc(cx,lbY,lbR*0.92,0,Math.PI*2);
  g.strokeStyle='rgba(220,220,220,0.5)'; g.lineWidth=1; g.stroke();
  g.beginPath(); g.arc(cx,lbY,lbR*0.66,0,Math.PI*2);
  let lg=g.createRadialGradient(cx-3,lbY-3,1,cx,lbY,lbR*0.66);
  lg.addColorStop(0,'#ffffff'); lg.addColorStop(1,'#e6e6e6'); g.fillStyle=lg; g.fill();
  // étoile rouge
  star(g,cx,lbY-lbR*0.02,5,lbR*0.34,lbR*0.14); g.fillStyle='#d10a0a'; g.fill();
  // texte
  g.fillStyle='#0e4e0e'; g.font=`bold ${Math.round(lbR*0.28)}px Arial Black`;
  g.textAlign='center'; g.textBaseline='middle'; g.fillText('FLAPPY',cx,lbY+lbR*0.5);
  g.textBaseline='alphabetic';

  return cv;
}
const BOTTLE=buildBottle();

function drawBottle(bx,by,rot,opened){
  ctx.save();
  ctx.translate(bx+BW/2, by+BH/2); ctx.rotate(rot);
  // sprite verre centré
  ctx.drawImage(BOTTLE, -BOTTLE._w/2, -BOTTLE._h/2, BOTTLE._w, BOTTLE._h);

  // géométrie centrée pour overlays
  const BASE=BH/2, bodyH=Gb.bodyH, bodyTop=BASE-bodyH;
  const neckTop=bodyTop-Gb.shldH-Gb.neckH, mouthTop=neckTop-Gb.mouthH, mouthW=Gb.mouthW;

  // bulles animées
  if(!opened){
    const t=Date.now()/500;
    [[-6,bodyTop+bodyH*0.7],[3,bodyTop+bodyH*0.5],[-1,bodyTop+bodyH*0.85]].forEach(([x2,y2],i)=>{
      const p=(t*0.4+i*0.33)%1, a=p<0.5?p*2:2-p*2;
      ctx.beginPath(); ctx.arc(x2,y2-p*bodyH*0.5,1.8,0,Math.PI*2);
      ctx.fillStyle=`rgba(220,255,210,${(a*0.4).toFixed(2)})`; ctx.fill();
    });
  }

  // capsule rouge OU mousse
  if(!opened){
    const capY=mouthTop-3, capR=mouthW/2+4;
    // dôme
    let cg=ctx.createLinearGradient(-capR,0,capR,0);
    cg.addColorStop(0,'#8a0000'); cg.addColorStop(0.4,'#e01818'); cg.addColorStop(0.55,'#ff5555');
    cg.addColorStop(0.7,'#e01818'); cg.addColorStop(1,'#8a0000');
    ctx.beginPath(); ctx.arc(0,capY+capR,capR,0,Math.PI*2);
    ctx.fillStyle=cg; ctx.fill(); ctx.strokeStyle='#5a0000'; ctx.lineWidth=1; ctx.stroke();
    // crénelures
    for(let i=0;i<11;i++){ const ang=(i/11)*Math.PI*2;
      ctx.beginPath(); ctx.arc(Math.cos(ang)*(capR+1.6),(capY+capR)+Math.sin(ang)*(capR+1.6),1.8,0,Math.PI*2);
      ctx.fillStyle='#c01010'; ctx.fill(); }
    // reflet
    ctx.beginPath(); ctx.ellipse(-capR*0.3,capY+capR*0.7,capR*0.3,capR*0.45,-0.3,0,Math.PI*2);
    ctx.fillStyle='rgba(255,255,255,0.4)'; ctx.fill();
  } else {
    const m=mouthTop;
    ctx.fillStyle='#fff8e7';
    ctx.beginPath(); ctx.ellipse(0,m,12,8,0,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(-7,m-6,7,6,-0.4,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(7,m-5,6,5,0.3,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(0,m-9,5,5,0,0,Math.PI*2); ctx.fill();
    for(let a=0;a<8;a++){ const ang=(a/8)*Math.PI*2;
      ctx.beginPath(); ctx.moveTo(Math.cos(ang)*9,m+Math.sin(ang)*9); ctx.lineTo(Math.cos(ang)*16,m+Math.sin(ang)*16);
      ctx.strokeStyle='#f4a200'; ctx.lineWidth=1.5; ctx.stroke(); }
  }
  ctx.restore();
}

// capsule volante
function drawCap(){
  const c=bird.cap; if(!c) return;
  ctx.save(); ctx.translate(c.x,c.y); ctx.rotate(c.rot);
  let cg=ctx.createLinearGradient(-7,0,7,0);
  cg.addColorStop(0,'#8a0000'); cg.addColorStop(0.5,'#ff4040'); cg.addColorStop(1,'#8a0000');
  ctx.beginPath(); ctx.arc(0,0,7,0,Math.PI*2); ctx.fillStyle=cg; ctx.fill();
  ctx.strokeStyle='#5a0000'; ctx.lineWidth=1; ctx.stroke();
  for(let i=0;i<10;i++){ const a=(i/10)*Math.PI*2;
    ctx.beginPath(); ctx.arc(Math.cos(a)*8.5,Math.sin(a)*8.5,1.8,0,Math.PI*2);
    ctx.fillStyle='#c01010'; ctx.fill(); }
  ctx.restore();
}

// ============================================================
//  AUDIO
// ============================================================
let ac=null;
function sound(type){
  try{
    if(!ac) ac=new (window.AudioContext||window.webkitAudioContext)();
    const o=ac.createOscillator(), g=ac.createGain(); o.connect(g); g.connect(ac.destination);
    if(type==='flap'){o.type='sine';o.frequency.setValueAtTime(520,ac.currentTime);o.frequency.exponentialRampToValueAtTime(300,ac.currentTime+0.12);g.gain.setValueAtTime(0.18,ac.currentTime);g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+0.12);o.start();o.stop(ac.currentTime+0.12);}
    else if(type==='score'){o.type='triangle';o.frequency.setValueAtTime(880,ac.currentTime);o.frequency.exponentialRampToValueAtTime(1200,ac.currentTime+0.1);g.gain.setValueAtTime(0.25,ac.currentTime);g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+0.15);o.start();o.stop(ac.currentTime+0.15);}
    else if(type==='die'){o.type='sawtooth';o.frequency.setValueAtTime(300,ac.currentTime);o.frequency.exponentialRampToValueAtTime(60,ac.currentTime+0.4);g.gain.setValueAtTime(0.3,ac.currentTime);g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+0.4);o.start();o.stop(ac.currentTime+0.4);}
  }catch(e){}
}

// ── Fond ──────────────────────────────────────────────────────
function drawBg(){
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#0d0628'); g.addColorStop(0.6,'#1f0f4a'); g.addColorStop(1,'#120820');
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
  stars.forEach(s=>{ s.a+=s.da; if(s.a>1||s.a<0.1)s.da*=-1;
    ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2); ctx.fillStyle=`rgba(255,255,220,${s.a.toFixed(2)})`; ctx.fill(); });
  clouds.forEach(c=>{ if(state==='PLAY'){c.x-=c.s; if(c.x<-80)c.x=W+80;}
    ctx.beginPath(); ctx.arc(c.x,c.y,c.r,0,Math.PI*2); ctx.fillStyle='rgba(255,200,100,0.06)'; ctx.fill(); });
  ctx.font='bold 18px Arial Black'; ctx.textAlign='left';
  ctx.shadowColor='#ff6b35'; ctx.shadowBlur=12; ctx.fillStyle='#ff6b35'; ctx.fillText('🍺 BAR',30,60);
  ctx.shadowColor='#00e5ff'; ctx.fillStyle='#00e5ff'; ctx.fillText('OPEN',W-110,80); ctx.shadowBlur=0;
}
function drawFloor(){
  const y=H-FLOOR; ctx.fillStyle='#2a1810'; ctx.fillRect(0,y,W,FLOOR);
  for(let i=0;i<W;i+=40){ ctx.beginPath(); ctx.moveTo(i,y); ctx.lineTo(i,H);
    ctx.strokeStyle='rgba(255,180,80,0.12)'; ctx.lineWidth=1; ctx.stroke(); }
  ctx.fillStyle='#3a2010'; ctx.fillRect(0,y,W,4);
}

// ── HUD & écrans ─────────────────────────────────────────────
function drawHUD(){
  ctx.textAlign='center'; ctx.font='bold 46px Arial Black';
  ctx.fillStyle='rgba(0,0,0,0.4)'; ctx.fillText(score,W/2+2,72);
  ctx.fillStyle='#ffd700'; ctx.shadowColor='#f4a200'; ctx.shadowBlur=12; ctx.fillText(score,W/2,70); ctx.shadowBlur=0;
}
function drawStart(){
  ctx.fillStyle='rgba(10,5,25,0.78)'; ctx.fillRect(0,0,W,H);
  ctx.textAlign='center'; ctx.font='bold 52px Arial Black';
  ctx.shadowColor='#ff6b35'; ctx.shadowBlur=20;
  ctx.fillStyle='#ffd700'; ctx.fillText('🍺 FLAPPY',W/2,H/2-150);
  ctx.fillStyle='#f7c59f'; ctx.fillText('BEER',W/2,H/2-92); ctx.shadowBlur=0;
  ctx.drawImage(OPENER, W/2-120, H/2-66, 60, 102);
  drawBottle(W/2+55-BW/2, H/2-32, Math.sin(Date.now()/400)*0.12, false);
  const p=0.85+0.15*Math.sin(Date.now()/350);
  ctx.save(); ctx.translate(W/2,H/2+120); ctx.scale(p,p);
  ctx.beginPath(); ctx.roundRect(-95,-26,190,52,26); ctx.fillStyle='#ff6b35'; ctx.fill();
  ctx.strokeStyle='#fff'; ctx.lineWidth=2; ctx.stroke();
  ctx.font='bold 19px Arial Black'; ctx.fillStyle='#fff'; ctx.fillText('APPUYER POUR JOUER',0,7); ctx.restore();
  if(best>0){ ctx.font='bold 18px Arial'; ctx.fillStyle='#ffd700'; ctx.fillText('🏆 Meilleur : '+best,W/2,H/2+195); }
}
function drawOver(){
  ctx.fillStyle='rgba(10,5,25,0.82)'; ctx.fillRect(0,0,W,H);
  ctx.textAlign='center'; ctx.font='bold 46px Arial Black';
  ctx.shadowColor='#e03030'; ctx.shadowBlur=18; ctx.fillStyle='#ff4444'; ctx.fillText('DÉCAPSULÉ !',W/2,H/2-120); ctx.shadowBlur=0;
  ctx.font='bold 26px Arial Black'; ctx.fillStyle='#ffd700'; ctx.fillText('Score : '+score,W/2,H/2-62);
  if(score>=best&&score>0){ ctx.font='bold 20px Arial'; ctx.fillStyle='#f7c59f';
    ctx.shadowColor='#f4a200'; ctx.shadowBlur=8; ctx.fillText('🎉 NOUVEAU RECORD !',W/2,H/2-28); ctx.shadowBlur=0; }
  ctx.font='bold 20px Arial'; ctx.fillStyle='#c8d8e8'; ctx.fillText('Meilleur : '+best,W/2,H/2+8);
  const p=0.88+0.12*Math.sin(Date.now()/350);
  ctx.save(); ctx.translate(W/2,H/2+100); ctx.scale(p,p);
  ctx.beginPath(); ctx.roundRect(-80,-26,160,52,26); ctx.fillStyle='#2ea84a'; ctx.fill();
  ctx.strokeStyle='#fff'; ctx.lineWidth=2; ctx.stroke();
  ctx.font='bold 22px Arial Black'; ctx.fillStyle='#fff'; ctx.fillText('🔄 REJOUER',0,8); ctx.restore();
}

// ============================================================
//  LOGIQUE
// ============================================================
function spawn(){ const minY=150, maxY=H-FLOOR-330; pipes.push({x:W+20,gapY:minY+Math.random()*(maxY-minY),scored:false}); }
function reset(){ score=0; pipes=[]; spawnT=0; bird.y=H/2-BH/2; bird.vy=0; bird.rot=0; bird.opened=false; bird.cap=null; bird.shake=0; }
function start(){ reset(); state='PLAY'; flap(); }
function flap(){ bird.vy=FLAP; bird.rot=-0.45; sound('flap'); }
function hit(){
  const m=9, L=bird.x+m, Rr=bird.x+BW-m, T=bird.y+m, B=bird.y+BH-m;
  if(B>=H-FLOOR||T<=0) return true;
  for(const p of pipes){ const pL=p.x+11, pR=p.x+OPENER_W-11;
    if(Rr<pL||L>pR) continue;
    if(T<p.gapY||B>p.gapY+GAP) return true; }
  return false;
}
function die(){
  state='DEAD'; bird.opened=true;
  bird.cap={x:bird.x+BW/2,y:bird.y-5,vx:(Math.random()-0.5)*9,vy:-11,rot:0,vrot:(Math.random()-0.5)*0.5};
  sound('die'); if(score>best){ best=score; localStorage.setItem('flappyBeerBest',best); }
  bird.shake=10; setTimeout(()=>{ state='OVER'; },1400);
}
function update(dt){
  if(state!=='PLAY'&&state!=='DEAD') return;
  bird.vy+=GRAVITY; bird.y+=bird.vy;
  bird.rot+=(bird.vy*0.035-bird.rot)*0.12; bird.rot=Math.max(-0.6,Math.min(1.4,bird.rot));
  if(bird.shake>0) bird.shake-=0.8;
  if(bird.cap){ bird.cap.x+=bird.cap.vx; bird.cap.y+=bird.cap.vy; bird.cap.vy+=0.5; bird.cap.rot+=bird.cap.vrot; if(bird.cap.y>H+20) bird.cap=null; }
  if(state!=='PLAY') return;
  spawnT+=dt; if(spawnT>=SPAWN){ spawn(); spawnT=0; }
  for(const p of pipes){ p.x-=SPEED; if(!p.scored&&p.x+OPENER_W<bird.x){ p.scored=true; score++; sound('score'); } }
  pipes=pipes.filter(p=>p.x>-100);
  if(hit()) die();
}
function render(){
  ctx.save();
  if(bird.shake>1) ctx.translate((Math.random()-0.5)*bird.shake,(Math.random()-0.5)*bird.shake);
  drawBg();
  pipes.forEach(p=>{ drawOpener(p.x,p.gapY,true); drawOpener(p.x,p.gapY,false); });
  drawFloor();
  drawBottle(bird.x,bird.y,bird.rot,bird.opened);
  drawCap();
  if(state==='PLAY'||state==='DEAD') drawHUD();
  if(state==='START') drawStart();
  if(state==='OVER') drawOver();
  ctx.restore();
}
function loop(ts){ const dt=Math.min(ts-(last||ts),50); last=ts; update(dt); render(); requestAnimationFrame(loop); }

// ── Input ─────────────────────────────────────────────────────
function input(){ if(state==='START'||state==='OVER') start(); else if(state==='PLAY') flap(); }
canvas.addEventListener('click',input);
canvas.addEventListener('touchstart',e=>{ e.preventDefault(); input(); },{passive:false});
document.addEventListener('keydown',e=>{ if(e.code==='Space'||e.code==='ArrowUp') input(); });

requestAnimationFrame(loop);
</script>
